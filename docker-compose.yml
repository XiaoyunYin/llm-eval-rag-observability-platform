services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://llm_eval:llm_eval_password@postgres:5432/llm_eval
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - elasticsearch

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: llm_eval
      POSTGRES_USER: llm_eval
      POSTGRES_PASSWORD: llm_eval_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm_eval -d llm_eval"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  postgres_data:
  elasticsearch_data:
